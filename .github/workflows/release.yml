name: Build Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:

  build:

    runs-on: windows-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --icon assets/logo.ico `
          --add-data "assets;assets" `
          --name KitFW_Builder `
          main.py

      - name: Rename Artifact
        run: |
          move dist\KitFW_Builder.exe dist\KitFW_Builder_${{ github.ref_name }}.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/KitFW_Builder_${{ github.ref_name }}.exe